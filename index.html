<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ثبت موفقیت درخواست</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* جلوگیری کامل از اسکرول اضافی */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
overflow:hidden; /* مهم: جلوگیری از دو صفحه‌ای شدن */
font-family:Tahoma,Segoe UI,sans-serif;
}

/* پس‌زمینه */
.background{
position:fixed;
inset:0;
background:url('bag.jpg') center/cover no-repeat;
z-index:-2;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
z-index:-1;
}

/* فقط موبایل - یک صفحه کامل */
.container{
position:relative;
width:100%;
height:100vh; /* مهم: دقیقاً یک صفحه */
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;

color:#fff;
}

/* لوگو */
.logo{
width:100px;
margin-bottom:15px;
}

/* آیکون موفقیت */
.check{
width:85px;
height:85px;
background:#2ecc71;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:15px;
box-shadow:0 0 20px rgba(46,204,113,.5);
}

.check i{
font-size:40px;
color:white;
}

/* متن */
h1{
font-size:1.3rem;
margin-bottom:10px;
color:#6CFF7E;
}

.text{
font-size:0.95rem;
line-height:1.8;
margin-bottom:10px;
padding:0 10px;
}

.note{
font-size:0.8rem;
color:#ddd;
margin-bottom:20px;
padding:0 15px;
}

/* دکمه */
.whatsapp-btn{
display:inline-flex;
align-items:center;
justify-content:center;
gap:8px;

background:#25D366;
color:white;
text-decoration:none;

padding:12px 18px;
border-radius:50px;

font-size:0.95rem;
font-weight:bold;

width:85%;
max-width:300px;
}

.whatsapp-btn:hover{
background:#128C7E;
}

/* جلوگیری از مشکل iOS viewport */
@supports (-webkit-touch-callout: none) {
html,body{
height:-webkit-fill-available;
}
.container{
height:-webkit-fill-available;
}
}

</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">

    <img src="Logo.png" class="logo" alt="logo">

    <div class="check">
        <i class="fas fa-check"></i>
    </div>

    <h1>درخواست شما با موفقیت ثبت شد</h1>

    <div class="text">
        از اعتماد شما سپاسگزاریم.<br>
        تیم میتا آنلاین سرویس به زودی با شما تماس خواهد گرفت.
    </div>

    <div class="note">
        لطفاً واتساپ خود را بررسی نمایید.
    </div>

    <a id="whatsappLink" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
        ارتباط در واتساپ
    </a>

</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

const phone="93730556547";

const msg="سلام، درخواست من با موفقیت ثبت شد و منتظر تماس تیم میتا آنلاین سرویس هستم.";

document.getElementById("whatsappLink").href =
`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;

});
</script>

</body>
</html>
